<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form>
		<h1>Internship Form</h1>
  <div class="form-row">
    <div class="col-md-4 mb-3">
      <label for="validationDefault01" id="first-name-input">First name</label>
      <input type="text" class="form-control is-invalid" id="validationDefault01" placeholder="" required>
		<div class="invalid-feedback">
          First name required
        </div>
    </div>
    <div class="col-md-4 mb-3">
      <label for="validationDefault02" id="last-name-input">Last name</label>
      <input type="text" class="form-control is-invalid" id="validationDefault02" placeholder="" required>
		<div class="invalid-feedback">
          Last name required
        </div>
    </div>
    <div class="col-md-4 mb-3">
      <label for="exampleInputEmail1" id="email-input">Email address</label>
	  <input type="email" class="form-control is-invalid" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="xyz@abc.com">
		<div class="invalid-feedback">
          Email required
        </div>
    </div>
  </div>
  <div class="form-row">
    <div class="col-md-6 mb-3">
      <label for="validationDefault03" id="college-input">College</label>
      <input type="text" class="form-control is-invalid" id="validationDefault03" placeholder="" required>
		<div class="invalid-feedback">
          Please provide a valid college.
        </div>
    </div>
    <div class="col-md-3 mb-3">
      <label for="validationDefault04">Graduation Year</label>
      <select class="custom-select form-control is-invalid" id="inputGroupSelect01">
    <option selected>Choose...</option>
    <option value="1">2020</option>
    <option value="2">2021</option>
    <option value="3">2022</option>
    <option value="3">2023</option>
  </select>
		<div class="invalid-feedback">
          Please select a valid Graduation Year.
        </div>
    </div>
    <div class="col-md-3 mb-3">
      <label for="validationDefault05" id="roll-no-input">Roll No.</label>
      <input type="text" class="form-control is-invalid" id="validationDefault05" placeholder="" required>
      <div class="invalid-feedback">
          Please provide a valid Roll no.
        </div>
	</div>
  </div>
  <div class="form-group">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" value="" id="invalidCheck2" required>
      <label class="form-check-label form-control is-invalid" for="invalidCheck2" id="conditions-checkbox">
        Agree to terms and conditions
      </label>
		<div class="invalid-feedback">
          You must agree before submitting
        </div>
    </div>
  </div>
  <button class="btn btn-primary" type="submit">Submit form</button>
</form>
	
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
